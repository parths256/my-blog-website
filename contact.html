<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Code & Coffee</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F3F4FF;
      color: #333;
    }

    header {
      background: #6C63FF;
      color: white;
      padding: 25px;
      text-align: center;
    }

    nav {
      background: #2D2A7A;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      width: 90%;
      max-width: 700px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      border-top: 6px solid #FF6584;
    }

    h2 {
      color: #2D2A7A;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      color: #2D2A7A;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    input:focus, textarea:focus {
      border: 2px solid #6C63FF;
    }

    button {
      margin-top: 15px;
      background: #FF6584;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background: #ff3f6c;
    }

    footer {
      text-align: center;
      background: #2D2A7A;
      color: white;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Code & Coffee</h1>
    <p>Get in touch with me</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="container">
    <h2>Contact Form</h2>

    <form>
      <label>Full Name:</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Email:</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Message:</label>
      <textarea rows="5" placeholder="Write your message..." required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <p>© 2026 My Blog Website</p>
  </footer>

</body>
</html>
