<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Code & Coffee</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fceabb, #f8b500, #6c63ff);
      color: #333;
    }

    header {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      text-align: center;
      padding: 30px;
      color: white;
    }

    nav {
      background: rgba(0, 0, 0, 0.5);
      text-align: center;
      padding: 12px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      width: 90%;
      max-width: 600px;
      margin: 30px auto;
      background: rgba(255,255,255,0.9);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
    }

    h2 {
      color: #2D2A7A;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: 'Poppins', sans-serif;
    }

    button {
      background: #FF6584;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

    button:hover {
      background: #ff3f6c;
    }

    footer {
      text-align: center;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>📩 Contact Me</h1>
    <p>Drop a message anytime ✨</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="container">
    <h2>Send me a message 🚀</h2>

    <form>
      <input type="text" placeholder="Enter your name" required>
      <input type="email" placeholder="Enter your email" required>
      <textarea rows="5" placeholder="Write your message..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    <p>© 2026 Code & Coffee | Let’s connect ☕</p>
  </footer>

</body>
</html>
